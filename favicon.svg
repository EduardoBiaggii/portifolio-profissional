<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#16100a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="sun" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#fffae8"/>
      <stop offset="28%" stop-color="#ffd36e"/>
      <stop offset="62%" stop-color="#e8841a"/>
      <stop offset="100%" stop-color="#6b2f08"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8841a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8841a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Outer subtle border -->
  <circle cx="16" cy="16" r="15.4" fill="none" stroke="rgba(255,180,60,0.12)" stroke-width="0.6"/>

  <!-- Warm halo behind sun -->
  <circle cx="16" cy="16" r="9.5" fill="url(#halo)"/>

  <!-- Orbital ring + planet (grouped so planet sits on ring) -->
  <g transform="rotate(-28 16 16)">
    <!-- Ring: slightly dashed-like via two arcs for elegance -->
    <ellipse cx="16" cy="16" rx="12" ry="4.6"
             fill="none"
             stroke="rgba(255,195,80,0.38)"
             stroke-width="0.75"
             stroke-dasharray="18 6"/>
    <!-- Planet on orbit at angle ~-62°: x=16+12*cos(-62°)≈21.63, y=16+4.6*sin(-62°)≈11.94 -->
    <circle cx="21.63" cy="11.94" r="1.15" fill="#ffd36e" opacity="0.85" filter="url(#glow)"/>
  </g>

  <!-- Sun core -->
  <circle cx="16" cy="16" r="5.8" fill="url(#sun)" filter="url(#glow)"/>

  <!-- Specular highlight (gives 3-D depth) -->
  <ellipse cx="14.3" cy="13.7" rx="2" ry="1.3"
           fill="rgba(255,253,235,0.28)"
           transform="rotate(-12 14.3 13.7)"/>
</svg>
